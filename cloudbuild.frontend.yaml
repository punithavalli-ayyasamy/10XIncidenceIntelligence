# Cloud Build → Artifact Registry → Cloud Run (frontend SPA)
# Usage (Cloud Shell / CI):
#   gcloud builds submit --config=cloudbuild.frontend.yaml .
#
# Optional build-arg for live API:
#   --substitutions=_VITE_API_BASE_URL=https://tenx-incident-api-XXXX.a.run.app

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: tenx-incident-ui
  _AR_REPO: tenx-incident
  _ALLOW_UNAUTH: "true"
  _VITE_API_BASE_URL: ""

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: EnsureArtifactRegistry
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        if ! gcloud artifacts repositories describe "${_AR_REPO}" \
          --location="${_REGION}" >/dev/null 2>&1; then
          gcloud artifacts repositories create "${_AR_REPO}" \
            --repository-format=docker \
            --location="${_REGION}" \
            --description="10X Incident Intelligence images"
        fi

  - name: gcr.io/cloud-builders/docker
    id: Build
    args:
      - build
      - --build-arg
      - VITE_API_BASE_URL=${_VITE_API_BASE_URL}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest
      - ./frontend

  - name: gcr.io/cloud-builders/docker
    id: PushSha
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}

  - name: gcr.io/cloud-builders/docker
    id: PushLatest
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: Deploy
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"

        AUTH_ARGS=(--no-allow-unauthenticated)
        if [[ "${_ALLOW_UNAUTH}" == "true" ]]; then
          AUTH_ARGS=(--allow-unauthenticated)
        fi

        gcloud run deploy "${_SERVICE_NAME}" \
          --image="$${IMAGE}" \
          --region="${_REGION}" \
          --platform=managed \
          "$${AUTH_ARGS[@]}" \
          --port=8080 \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=5 \
          --timeout=60

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest

timeout: 1200s
