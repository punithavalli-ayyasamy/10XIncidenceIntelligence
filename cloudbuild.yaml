# Cloud Build → Artifact Registry → Cloud Run
# Trigger: push to main (GCP Console → Cloud Build → Triggers → connect GitHub)
#
# Substitutions (override on the trigger as needed):
#   _REGION, _SERVICE_NAME, _AR_REPO, _ALLOW_UNAUTH

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: tenx-incident-api
  _AR_REPO: tenx-incident
  _ALLOW_UNAUTH: "true"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: EnsureArtifactRegistry
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        if ! gcloud artifacts repositories describe "${_AR_REPO}" \
          --location="${_REGION}" >/dev/null 2>&1; then
          gcloud artifacts repositories create "${_AR_REPO}" \
            --repository-format=docker \
            --location="${_REGION}" \
            --description="10X Incident Intelligence images"
        fi

  - name: gcr.io/cloud-builders/docker
    id: Build
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest
      - ./backend

  - name: gcr.io/cloud-builders/docker
    id: PushSha
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}

  - name: gcr.io/cloud-builders/docker
    id: PushLatest
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: Deploy
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"

        AUTH_ARGS=(--no-allow-unauthenticated)
        if [[ "${_ALLOW_UNAUTH}" == "true" ]]; then
          AUTH_ARGS=(--allow-unauthenticated)
        fi

        SECRET_ARGS=()
        if gcloud secrets describe gemini-api-key >/dev/null 2>&1; then
          SECRET_ARGS=(--set-secrets=GEMINI_API_KEY=gemini-api-key:latest)
        fi

        gcloud run deploy "${_SERVICE_NAME}" \
          --image="$${IMAGE}" \
          --region="${_REGION}" \
          --platform=managed \
          "$${AUTH_ARGS[@]}" \
          --port=8080 \
          --memory=1Gi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=5 \
          --timeout=300 \
          --set-env-vars=ALLOW_HEURISTIC_LLM_FALLBACK=true,GEMINI_MODEL=gemini-2.0-flash \
          "$${SECRET_ARGS[@]}"

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest

timeout: 1200s
