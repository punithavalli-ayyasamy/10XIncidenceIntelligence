# Cloud Build → Artifact Registry → Cloud Run (frontend SPA)
#
# Run from this directory (frontend/):
#   gcloud builds submit --config=cloudbuild.frontend.yaml .
#
# With live API URL (required for Mission Control to call Cloud Run API):
#   gcloud builds submit --config=cloudbuild.frontend.yaml . \
#     --substitutions=_TAG=manual1,_VITE_API_BASE_URL=https://tenx-incidentagent-api-XXXX.a.run.app
#
# PROJECT_ID comes from your gcloud project (e.g. hack-team-finai-force).

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: tenx-incidentagent-ui
  _AR_REPO: tenx-incident
  _ALLOW_UNAUTH: "true"
  _VITE_API_BASE_URL: ""
  # Use _TAG for manual submits (SHORT_SHA is often empty outside GitHub triggers)
  _TAG: manual

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: EnsureArtifactRegistry
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        if ! gcloud artifacts repositories describe "${_AR_REPO}" \
          --location="${_REGION}" >/dev/null 2>&1; then
          gcloud artifacts repositories create "${_AR_REPO}" \
            --repository-format=docker \
            --location="${_REGION}" \
            --description="10X Incident Intelligence images"
        fi

  - name: gcr.io/cloud-builders/docker
    id: Build
    args:
      - build
      - --build-arg
      - VITE_API_BASE_URL=${_VITE_API_BASE_URL}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${_TAG}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: PushTag
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${_TAG}

  - name: gcr.io/cloud-builders/docker
    id: PushLatest
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: Deploy
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${_TAG}"

        AUTH_ARGS=(--no-allow-unauthenticated)
        if [[ "${_ALLOW_UNAUTH}" == "true" ]]; then
          AUTH_ARGS=(--allow-unauthenticated)
        fi

        gcloud run deploy "${_SERVICE_NAME}" \
          --image="$${IMAGE}" \
          --region="${_REGION}" \
          --platform=managed \
          "$${AUTH_ARGS[@]}" \
          --port=8080 \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=5 \
          --timeout=60

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${_TAG}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest

timeout: 1200s
